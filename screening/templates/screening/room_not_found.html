{% extends 'base.html' %}
{% block content %}
<div class="container-fluid min-vh-100 d-flex flex-column align-items-center justify-content-center py-5 px-4" 
     style="background: radial-gradient(circle at top right, #1e3a8a, #0f172a);">
    
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4 animate__animated animate__fadeInUp">
        <div class="card border-0 shadow-2xl p-4 p-md-5 text-center" 
             style="border-radius: 40px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);">
            
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle shadow-sm" 
                     style="width: 90px; height: 90px; background: #fff1f2; border: 8px solid #fff; flex-shrink: 0;">
                    <i class="bi bi-search text-danger display-5"></i>
                </div>
            </div>

            <h2 class="fw-bold text-slate-900 mb-2 ls-tight" style="letter-spacing: -1px;">Room Not Found</h2>
            <p class="text-muted small mb-4 px-lg-3">
                The code <span class="badge bg-light text-primary border px-2 py-1 fw-bold">{{ attempted_code }}</span> 
                didn't match any active hiring rooms.
            </p>

            <div class="d-grid gap-3">
                <a href="{% url 'home_ats_checker' %}" 
                   class="btn btn-primary btn-lg rounded-pill fw-bold py-3 shadow-lg transition-hover" 
                   style="background: #1e3a8a; border: none;">
                    <i class="bi bi-arrow-left me-2"></i>Try Another Code
                </a>
                
                <a href="{% url 'home_ats_checker' %}" 
                   class="btn btn-link text-decoration-none text-secondary x-small fw-bold">
                    Return to Candidate Home
                </a>
            </div>
        </div>

        <div class="text-center mt-4">
            <p class="text-white-50 x-small ls-1 fw-medium">
                <i class="bi bi-info-circle me-1"></i> CODES ARE CASE-SENSITIVE • VERIFY WITH YOUR RECRUITER
            </p>
        </div>
    </div>
</div>

<style>
    html, body { 
        height: auto; 
        min-height: 100%;
        overflow-y: auto !important; 
        background: #0f172a; 
    }

    .text-slate-900 { color: #0f172a; }
    .x-small { font-size: 0.72rem; }
    .ls-tight { line-height: 1.2; }
    .ls-1 { letter-spacing: 1.5px; }
    .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4); }
    
    .transition-hover { transition: all 0.3s ease; }
    .transition-hover:hover { 
        transform: translateY(-3px); 
        box-shadow: 0 15px 30px -5px rgba(30, 58, 138, 0.4); 
    }
</style>
{% endblock %}
