{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="fw-bold mb-1">Apply for {{ room.name }}</h2>
            <p class="text-muted mb-4">Room Code: <code>{{ room.slug }}</code></p>

            <div class="card border-0 shadow-sm mb-4 text-start">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0">Job Description</h5>
                        <button class="btn btn-sm btn-outline-primary" type="button" data-bs-toggle="collapse" data-bs-target="#jdCollapse">
                            View Requirements
                        </button>
                    </div>
                    <div class="collapse mt-3" id="jdCollapse">
                        <div class="p-3 bg-light rounded border small text-muted" style="white-space: pre-wrap;">
                            {{ room.jd_text }} </div>
                    </div>
                </div>
            </div>

            <div class="card shadow border-0 p-4">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold">Upload Your Resume (PDF)</label>
                        <input type="file" name="resume" class="form-control" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" style="background-color: #3b71fe; border: none;">
                        Submit Application
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
